<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Color Hunt</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg-deep: #0c0c1d;
    --bg-mid: #1a1a3e;
    --bg-accent: #2d1b4e;
    --text: #dfe6e9;
    --text-dim: #b2bec3;
    --text-muted: #636e72;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.1);
    --glass-hover: rgba(255,255,255,0.12);
    --purple: #6c5ce7;
    --purple-light: #a29bfe;
    --gold: #ffeaa7;
    --gold-dark: #fdcb6e;
    --pink: #ff6b81;
    --red: #ff4757;
    --green: #00b894;
    --green-light: #55efc4;
    --orange: #ffa502;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh; min-height: 100dvh;
    background: linear-gradient(160deg, var(--bg-deep) 0%, var(--bg-mid) 40%, var(--bg-accent) 70%, var(--bg-deep) 100%);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 16px;
    overflow-x: hidden;
  }

  input::placeholder { color: rgba(255,255,255,0.3); }

  .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 460px; }
  .screen.active { display: flex; }

  .card {
    background: var(--glass);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 24px; padding: 28px;
    border: 1px solid var(--glass-border);
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  h1.title {
    font-size: clamp(32px, 8vw, 42px); font-weight: 800;
    text-align: center; margin: 0 0 8px; line-height: 1.1;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center; color: var(--text-dim); font-size: 14px;
    margin: 0 0 24px; line-height: 1.5;
  }

  .input-group { margin-bottom: 16px; }
  .input-group label { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; display: block; }

  input.code-input {
    width: 100%; padding: 14px 18px; border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08); color: #fff;
    font-size: 18px; font-family: 'JetBrains Mono', monospace;
    outline: none; text-align: center; letter-spacing: 4px; text-transform: uppercase;
  }

  input.name-input {
    width: 100%; padding: 14px 18px; border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08); color: #fff;
    font-size: 18px; font-family: 'Outfit', sans-serif; outline: none;
    text-align: center;
  }

  input:focus { border-color: var(--purple); }

  .btn-primary {
    width: 100%; padding: 16px 24px; border-radius: 16px;
    border: none; font-size: 18px; font-weight: 700; cursor: pointer;
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(135deg, var(--purple), var(--purple-light));
    color: #fff; box-shadow: 0 8px 30px rgba(108,92,231,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    background: rgba(255,255,255,0.1); color: var(--text-muted);
    box-shadow: none; cursor: not-allowed; transform: none;
  }

  .btn-secondary {
    width: 100%; padding: 16px 24px; border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.2); font-size: 18px;
    font-weight: 700; cursor: pointer; background: transparent;
    color: var(--text); font-family: 'Outfit', sans-serif;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.06); }

  .btn-camera {
    padding: 14px 28px; border-radius: 14px; border: none;
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    font-family: 'Outfit', sans-serif;
    transition: transform 0.15s; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .btn-camera:active { transform: scale(0.97); }

  .btn-danger {
    padding: 12px 24px; border-radius: 14px;
    border: 2px solid rgba(255,107,129,0.4);
    background: rgba(255,107,129,0.15); color: var(--pink);
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: 'Outfit', sans-serif;
  }

  .game-code-display {
    margin: 16px 0; padding: 12px 32px; border-radius: 16px;
    background: rgba(108,92,231,0.2); border: 2px dashed rgba(108,92,231,0.5);
    text-align: center;
  }
  .game-code-display .label { font-size: 12px; color: var(--text-dim); }
  .game-code-display .code {
    font-family: 'JetBrains Mono', monospace; font-size: clamp(28px, 7vw, 36px);
    font-weight: 700; letter-spacing: 8px; color: var(--gold);
  }

  .player-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; margin-bottom: 6px; border-radius: 12px;
    background: rgba(255,255,255,0.06);
  }
  .player-row .icon { font-size: 20px; }
  .player-row .name { font-weight: 600; font-size: 15px; }

  .timer-bar {
    display: flex; align-items: center; gap: 12px; width: 100%;
  }
  .timer-track {
    flex: 1; height: 8px; border-radius: 4px;
    background: rgba(255,255,255,0.15); overflow: hidden;
  }
  .timer-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--pink), var(--orange));
    transition: width 1s linear;
  }
  .timer-fill.urgent { background: var(--red); }
  .timer-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700; color: var(--gold);
    min-width: 45px; text-align: right;
  }
  .timer-text.urgent { color: var(--red); animation: pulse 1s infinite; }

  .color-swatch {
    width: 140px; height: 140px; border-radius: 24px;
    border: 3px solid rgba(255,255,255,0.2);
    margin: 0 auto; animation: colorPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .color-hex {
    text-align: center; margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; color: var(--text-dim); letter-spacing: 2px;
  }

  .leaderboard-compact { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .leaderboard-compact .chip {
    background: rgba(255,255,255,0.1); border-radius: 20px;
    padding: 4px 12px; font-size: 13px; color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    border: 1px solid transparent;
  }
  .leaderboard-compact .chip.first { border-color: var(--gold); }

  .lb-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; margin-bottom: 6px; border-radius: 12px;
    background: rgba(255,255,255,0.06); border: 1px solid transparent;
  }
  .lb-row.first { background: rgba(255,234,167,0.15); border-color: rgba(255,234,167,0.3); }
  .lb-row .rank { font-size: 20px; width: 30px; text-align: center; }
  .lb-row .lname { flex: 1; font-weight: 600; font-size: 15px; }
  .lb-row .lscore {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 16px; background: rgba(255,255,255,0.1);
    border-radius: 8px; padding: 4px 12px; min-width: 50px; text-align: center;
  }
  .lb-row.first .lscore { color: var(--gold); }

  .score-big {
    font-size: 48px; font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
    animation: colorPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-align: center;
  }

  .result-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; margin-bottom: 6px; border-radius: 12px;
    background: rgba(255,255,255,0.06);
  }
  .result-row.me { background: rgba(108,92,231,0.15); }

  video, .preview-img {
    width: 100%; max-width: 380px; border-radius: 16px;
    border: 3px solid rgba(255,255,255,0.2); margin-bottom: 16px;
    display: block; margin-left: auto; margin-right: auto;
  }

  .flex-gap { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .flex-col { display: flex; flex-direction: column; gap: 14px; }

  .waiting { animation: pulse 2s infinite; color: var(--text-dim); text-align: center; font-size: 14px; }

  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes colorPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes bounceIn { 0% { transform: scale(0); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

  .float-anim { animation: float 4s ease-in-out infinite; }
  .bounce-in { animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

  .footer-text { margin-top: 32px; font-size: 12px; color: var(--text-muted); text-align: center; max-width: 320px; }

  .header-row {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .count-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
  }
</style>
</head>
<body>

<!-- ══════════ HOME ══════════ -->
<div id="screen-home" class="screen active">
  <div class="float-anim" style="margin:40px 0 20px"><div style="font-size:64px">🎨</div></div>
  <h1 class="title">Color Hunt</h1>
  <p class="subtitle">Find the color. Capture it. Win!</p>
  <div class="card flex-col">
    <button class="btn-primary" onclick="createGame()">🎮 Create Game</button>
    <button class="btn-secondary" onclick="showScreen('join')">🚀 Join Game</button>
  </div>
  <p class="footer-text">2–35 players · Capture colors from the real world · First to 100 wins</p>
</div>

<!-- ══════════ JOIN ══════════ -->
<div id="screen-join" class="screen">
  <h1 class="title" style="margin-top:40px;font-size:32px">Join Game</h1>
  <p class="subtitle">Enter the game code shared by the admin</p>
  <div class="card flex-col">
    <div class="input-group">
      <label>Game Code</label>
      <input id="joinCodeInput" class="code-input" placeholder="XXXXX" maxlength="5"
             oninput="this.value=this.value.toUpperCase(); checkJoinBtn()">
    </div>
    <div class="input-group">
      <label>Your Name</label>
      <input id="playerNameInput" class="name-input" placeholder="Enter your name" maxlength="20"
             oninput="checkJoinBtn()">
    </div>
    <button id="joinBtn" class="btn-primary" disabled onclick="joinGame()">Join →</button>
    <button class="btn-secondary" style="padding:12px 24px;font-size:15px" onclick="showScreen('home')">← Back</button>
  </div>
</div>

<!-- ══════════ LOBBY ══════════ -->
<div id="screen-lobby" class="screen">
  <h1 class="title" style="margin-top:24px;font-size:28px">Game Lobby</h1>
  <div class="game-code-display">
    <span class="label">GAME CODE</span>
    <div class="code" id="lobbyCode"></div>
  </div>
  <p class="subtitle">Share this code with your friends to join!</p>
  <div class="card">
    <div class="header-row">
      <span style="font-weight:700;font-size:16px">Players</span>
      <span id="playerCount" class="count-badge"></span>
    </div>
    <div id="playerList"></div>
    <div id="lobbyActions"></div>
  </div>
</div>

<!-- ══════════ PLAYING ══════════ -->
<div id="screen-playing" class="screen">
  <div style="width:100%;margin-top:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span id="roundLabel" style="font-weight:700;font-size:14px;color:var(--text-dim)"></span>
      <span id="myScoreLabel" style="font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--gold)"></span>
    </div>
    <div class="timer-bar">
      <div class="timer-track"><div id="timerFill" class="timer-fill"></div></div>
      <span id="timerText" class="timer-text"></span>
    </div>
  </div>
  <div style="margin-top:8px;text-align:center">
    <p style="font-size:14px;color:var(--text-dim);margin-bottom:4px">Find this color!</p>
    <div id="targetColorArea"></div>
  </div>
  <div class="card" style="margin-top:8px">
    <div id="captureArea"></div>
  </div>
  <div id="compactLeaderboard" style="margin-top:12px;width:100%"></div>
  <div id="adminEndRound" style="margin-top:16px;text-align:center"></div>
</div>

<!-- ══════════ ROUND END ══════════ -->
<div id="screen-roundEnd" class="screen">
  <h1 class="title" style="margin-top:24px;font-size:28px" id="roundEndTitle"></h1>
  <div id="roundEndColor"></div>
  <div class="card" style="margin-top:8px">
    <h3 style="text-align:center;margin-bottom:8px;font-weight:700;font-size:15px">Round Scores</h3>
    <div id="roundResults"></div>
  </div>
  <div id="roundEndActions" style="margin-top:20px;width:100%;max-width:420px"></div>
</div>

<!-- ══════════ GAME OVER ══════════ -->
<div id="screen-gameOver" class="screen">
  <div class="float-anim" style="margin:30px 0 10px"><div style="font-size:80px">🏆</div></div>
  <h1 class="title" style="font-size:36px" id="winnerTitle"></h1>
  <p class="subtitle" style="font-size:18px" id="winnerScore"></p>
  <div class="card">
    <h3 style="text-align:center;margin-bottom:16px;font-weight:700">Final Standings</h3>
    <div id="finalLeaderboard"></div>
  </div>
  <div id="gameOverActions" style="margin-top:20px;width:100%;max-width:420px"></div>
</div>

<canvas id="photoCanvas" style="display:none"></canvas>

<script>
// ─── Supabase Setup ───
const SUPABASE_URL = 'https://uiqirozbmfopcyojggii.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpcWlyb3pibWZvcGN5b2pnZ2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTM5NDQsImV4cCI6MjA5MjI2OTk0NH0.V2uCQIxrStjbdwOhvfgf__Fl5r1UQ7uOhM_srWH7y44';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── Constants ───
const ROUND_TIME = 60;
const WIN_SCORE = 100;
const MIN_PLAYERS = 2;
const MAX_PLAYERS = 35;

// ─── State ───
let role = null;         // 'admin' | 'player'
let gameCode = '';
let playerId = localStorage.getItem('ch_pid') || (() => { const id = Math.random().toString(36).slice(2,10); localStorage.setItem('ch_pid', id); return id; })();
let currentScreen = 'home';
let gameData = null;     // { code, status, round, current_color, round_started_at, round_results, winner }
let players = [];        // [{ id, name, score }]
let submissions = [];
let timeLeft = ROUND_TIME;
let timerInterval = null;
let submitted = false;
let roundScore = null;
let photoPreviewUrl = null;
let cameraStream = null;
let realtimeChannel = null;

// ─── Color Utilities ───
function generateRandomColor() {
  const h = Math.floor(Math.random() * 360);
  const s = 50 + Math.floor(Math.random() * 40);
  const l = 35 + Math.floor(Math.random() * 35);
  return hslToHex(h, s, l);
}
function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h / 30) % 12; const c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); return Math.round(255 * c).toString(16).padStart(2, '0'); };
  return `#${f(0)}${f(8)}${f(4)}`;
}
function hexToRgb(hex) { return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) }; }
function rgbToLab(r, g, b) {
  let rr=r/255, gg=g/255, bb=b/255;
  rr = rr > 0.04045 ? Math.pow((rr+0.055)/1.055,2.4) : rr/12.92;
  gg = gg > 0.04045 ? Math.pow((gg+0.055)/1.055,2.4) : gg/12.92;
  bb = bb > 0.04045 ? Math.pow((bb+0.055)/1.055,2.4) : bb/12.92;
  let x=(rr*0.4124+gg*0.3576+bb*0.1805)/0.95047, y=(rr*0.2126+gg*0.7152+bb*0.0722)/1.0, z=(rr*0.0193+gg*0.1192+bb*0.9505)/1.08883;
  x = x>0.008856 ? Math.pow(x,1/3) : 7.787*x+16/116;
  y = y>0.008856 ? Math.pow(y,1/3) : 7.787*y+16/116;
  z = z>0.008856 ? Math.pow(z,1/3) : 7.787*z+16/116;
  return { L:116*y-16, a:500*(x-y), b:200*(y-z) };
}
function deltaE(l1,l2) { return Math.sqrt((l1.L-l2.L)**2+(l1.a-l2.a)**2+(l1.b-l2.b)**2); }
function calculateColorScore(imageData, targetHex) {
  const t = hexToRgb(targetHex), tl = rgbToLab(t.r,t.g,t.b);
  const px = imageData.data, step = 4*Math.max(1, Math.floor(px.length/(4*2000)));
  let total=0, cnt=0;
  for (let i=0; i<px.length; i+=step) {
    if (px[i+3]<128) continue;
    const lab = rgbToLab(px[i],px[i+1],px[i+2]);
    total += Math.max(0, 1 - deltaE(tl, lab)/100);
    cnt++;
  }
  if (!cnt) return 1;
  return Math.max(1, Math.min(10, Math.round((total/cnt)*12)));
}
function genCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let r='';
  for (let i=0;i<5;i++) r+=c[Math.floor(Math.random()*c.length)]; return r;
}

// ─── Screen Management ───
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(`screen-${name}`);
  if (el) el.classList.add('active');
  currentScreen = name;
}

// ─── Supabase Realtime ───
function subscribeToGame(code) {
  if (realtimeChannel) { sb.removeChannel(realtimeChannel); }
  realtimeChannel = sb.channel(`game-${code}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'games', filter: `code=eq.${code}` }, payload => {
      if (payload.new) { gameData = payload.new; onGameUpdate(); }
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players', filter: `game_code=eq.${code}` }, async () => {
      await refreshPlayers();
      renderCurrentScreen();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'submissions', filter: `game_code=eq.${code}` }, async () => {
      await refreshSubmissions();
    })
    .subscribe();
}

async function refreshPlayers() {
  const { data } = await sb.from('players').select('*').eq('game_code', gameCode).order('created_at');
  if (data) players = data;
}

async function refreshSubmissions() {
  if (!gameData) return;
  const { data } = await sb.from('submissions').select('*').eq('game_code', gameCode).eq('round', gameData.round);
  if (data) submissions = data;
}

async function refreshGameState() {
  const { data } = await sb.from('games').select('*').eq('code', gameCode).single();
  if (data) gameData = data;
  await refreshPlayers();
  await refreshSubmissions();
}

function onGameUpdate() {
  if (!gameData) return;
  const s = gameData.status;
  if (s === 'playing') {
    submitted = false; roundScore = null; photoPreviewUrl = null;
    // check if I already submitted this round
    const mySub = submissions.find(sub => sub.player_id === playerId && sub.round === gameData.round);
    if (mySub) { submitted = true; roundScore = mySub.score; }
    showScreen('playing');
    startTimer();
  } else if (s === 'roundEnd') {
    stopTimer();
    showScreen('roundEnd');
  } else if (s === 'gameOver') {
    stopTimer();
    showScreen('gameOver');
  } else if (s === 'lobby') {
    stopTimer();
    showScreen('lobby');
  }
  renderCurrentScreen();
}

// ─── Timer ───
function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    if (!gameData || !gameData.round_started_at) return;
    const elapsed = Math.floor((Date.now() - gameData.round_started_at) / 1000);
    timeLeft = Math.max(0, ROUND_TIME - elapsed);
    renderTimer();
    if (timeLeft === 0) {
      stopTimer();
      if (role === 'admin') endRound();
    }
  }, 500);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function renderTimer() {
  const pct = (timeLeft / ROUND_TIME) * 100;
  const urgent = timeLeft <= 10;
  const fill = document.getElementById('timerFill');
  const text = document.getElementById('timerText');
  if (fill) { fill.style.width = pct + '%'; fill.className = 'timer-fill' + (urgent ? ' urgent' : ''); }
  if (text) { text.textContent = timeLeft + 's'; text.className = 'timer-text' + (urgent ? ' urgent' : ''); }
}

// ─── Render ───
function renderCurrentScreen() {
  if (currentScreen === 'lobby') renderLobby();
  else if (currentScreen === 'playing') renderPlaying();
  else if (currentScreen === 'roundEnd') renderRoundEnd();
  else if (currentScreen === 'gameOver') renderGameOver();
}

const ICONS = ['🔴','🔵','🟢','🟡','🟣','🟠','⚪'];

function renderLobby() {
  document.getElementById('lobbyCode').textContent = gameCode;
  const canStart = players.length >= MIN_PLAYERS && players.length <= MAX_PLAYERS;
  document.getElementById('playerCount').textContent = `${players.length}/${MAX_PLAYERS}`;
  document.getElementById('playerCount').style.color = canStart ? 'var(--green)' : 'var(--gold-dark)';

  const list = document.getElementById('playerList');
  if (players.length === 0) {
    list.innerHTML = '<p class="waiting" style="padding:20px 0">Waiting for players to join...</p>';
  } else {
    list.innerHTML = players.map((p, i) => `
      <div class="player-row"><span class="icon">${ICONS[i%7]}</span><span class="name">${esc(p.name)}</span></div>
    `).join('');
  }

  const actions = document.getElementById('lobbyActions');
  if (role === 'admin') {
    actions.innerHTML = `<button class="btn-primary" style="margin-top:20px" ${canStart?'':'disabled'} onclick="startRound()">
      ${canStart ? '🚀 Start Game!' : `Need ${MIN_PLAYERS - players.length} more player(s)`}
    </button>`;
  } else {
    actions.innerHTML = '<p class="waiting" style="margin-top:16px">Waiting for the admin to start the game...</p>';
  }
}

function renderColorSwatch(color) {
  return `<div style="margin:16px auto">
    <div class="color-swatch" style="background:${color};box-shadow:0 0 60px ${color}66, 0 0 120px ${color}33, inset 0 2px 4px rgba(255,255,255,0.2)"></div>
    <p class="color-hex">${color.toUpperCase()}</p>
  </div>`;
}

function renderPlaying() {
  const me = players.find(p => p.id === playerId);
  document.getElementById('roundLabel').textContent = `Round ${gameData?.round || 1}`;
  document.getElementById('myScoreLabel').textContent = me ? `Score: ${me.score}` : '';

  const colorArea = document.getElementById('targetColorArea');
  if (gameData?.current_color) colorArea.innerHTML = renderColorSwatch(gameData.current_color);

  const cap = document.getElementById('captureArea');
  if (submitted) {
    const sc = roundScore || 0;
    const clr = sc >= 7 ? 'var(--green)' : sc >= 4 ? 'var(--gold-dark)' : 'var(--pink)';
    const msg = sc >= 8 ? 'Amazing match! 🎯' : sc >= 5 ? 'Good find! 👍' : sc >= 3 ? 'Not bad! 🤔' : 'Try harder next time! 😅';
    cap.innerHTML = `<div style="text-align:center">
      ${photoPreviewUrl ? `<img src="${photoPreviewUrl}" class="preview-img" alt="Your photo">` : ''}
      <div class="score-big" style="color:${clr}">+${sc}</div>
      <p style="color:var(--text-dim);font-size:14px;margin-top:8px">${msg}</p>
      <p style="color:var(--text-muted);font-size:13px;margin-top:12px">Waiting for other players...</p>
    </div>`;
  } else {
    cap.innerHTML = `<div style="text-align:center">
      <p style="font-size:14px;color:var(--text-dim);margin-bottom:16px">Take a photo of something matching the color!</p>
      <div id="cameraMount"></div>
    </div>`;
    renderCameraUI();
  }

  // compact leaderboard
  const sorted = [...players].sort((a,b) => b.score - a.score);
  document.getElementById('compactLeaderboard').innerHTML = `<div class="leaderboard-compact">
    ${sorted.map((p,i) => `<span class="chip ${i===0?'first':''}">${i===0?'👑 ':''}${esc(p.name)}: ${p.score}</span>`).join('')}
  </div>`;

  document.getElementById('adminEndRound').innerHTML = role === 'admin'
    ? '<button class="btn-danger" onclick="endRound()">⏹ End Round Early</button>' : '';

  renderTimer();
}

function renderRoundEnd() {
  document.getElementById('roundEndTitle').textContent = `Round ${gameData?.round || ''} Results`;
  document.getElementById('roundEndColor').innerHTML = gameData?.current_color ? renderColorSwatch(gameData.current_color) : '';

  const results = gameData?.round_results || {};
  const res = document.getElementById('roundResults');
  res.innerHTML = players.map(p => {
    const rs = results[p.id] || 0;
    return `<div class="result-row ${p.id===playerId?'me':''}">
      <span style="font-weight:600">${esc(p.name)}</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-family:'JetBrains Mono',monospace;color:${rs>0?'var(--green)':'var(--pink)'};font-weight:700">+${rs}</span>
        <span style="font-family:'JetBrains Mono',monospace;color:var(--text-dim);font-size:13px">(${p.score} total)</span>
      </div>
    </div>`;
  }).join('');

  const acts = document.getElementById('roundEndActions');
  if (role === 'admin') {
    acts.innerHTML = '<button class="btn-primary" onclick="startRound()">▶ Next Round</button>';
  } else {
    acts.innerHTML = '<p class="waiting">Waiting for admin to start next round...</p>';
  }
}

function renderGameOver() {
  const winner = gameData?.winner;
  if (!winner) return;
  const isMe = winner.id === playerId;
  document.getElementById('winnerTitle').textContent = isMe ? 'You Win!' : `${winner.name} Wins!`;
  document.getElementById('winnerScore').textContent = `Final score: ${winner.score} points`;

  const sorted = [...players].sort((a,b) => b.score - a.score);
  const ranks = ['👑','🥈','🥉'];
  document.getElementById('finalLeaderboard').innerHTML = sorted.map((p,i) => `
    <div class="lb-row ${i===0?'first':''}">
      <span class="rank">${ranks[i] || '#'+(i+1)}</span>
      <span class="lname">${esc(p.name)}</span>
      <span class="lscore">${p.score}</span>
    </div>
  `).join('');

  const acts = document.getElementById('gameOverActions');
  if (role === 'admin') {
    acts.innerHTML = '<button class="btn-primary" onclick="playAgain()">🔄 Play Again</button>';
  } else {
    acts.innerHTML = '';
  }
}

// ─── Camera ───
function renderCameraUI() {
  const mount = document.getElementById('cameraMount');
  if (!mount) return;
  mount.innerHTML = `<button class="btn-camera" style="background:linear-gradient(135deg,var(--purple),var(--purple-light))" onclick="openCamera()">📷 Open Camera</button>`;
}
async function openCamera() {
  const mount = document.getElementById('cameraMount');
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment', width:{ideal:640}, height:{ideal:480} } });
    mount.innerHTML = `<video id="camVideo" autoplay playsinline muted style="width:100%;max-width:380px;border-radius:16px;border:3px solid rgba(255,255,255,0.2);margin-bottom:16px"></video>
      <div class="flex-gap">
        <button class="btn-camera" style="background:linear-gradient(135deg,var(--green),var(--green-light))" onclick="capturePhoto()">📸 Capture</button>
        <button class="btn-camera" style="background:rgba(255,255,255,0.15)" onclick="closeCamera()">✕ Cancel</button>
      </div>`;
    document.getElementById('camVideo').srcObject = cameraStream;
  } catch(e) {
    mount.innerHTML = `<p style="color:var(--pink);margin-bottom:12px;font-size:14px">Camera access denied. Please allow camera permissions.</p>
      <button class="btn-camera" style="background:linear-gradient(135deg,var(--purple),var(--purple-light))" onclick="openCamera()">📷 Try Again</button>`;
  }
}
function closeCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null; }
  renderCameraUI();
}
function capturePhoto() {
  const video = document.getElementById('camVideo');
  const canvas = document.getElementById('photoCanvas');
  if (!video||!canvas) return;
  canvas.width = video.videoWidth||640;
  canvas.height = video.videoHeight||480;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video,0,0);
  const dataUrl = canvas.toDataURL('image/jpeg',0.8);
  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  if (cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null; }

  const mount = document.getElementById('cameraMount');
  mount.innerHTML = `<img src="${dataUrl}" class="preview-img" alt="Preview">
    <div class="flex-gap">
      <button class="btn-camera" style="background:linear-gradient(135deg,var(--green),var(--green-light))" onclick="submitCapture()">✓ Submit Photo</button>
      <button class="btn-camera" style="background:rgba(255,255,255,0.15)" onclick="openCamera()">↺ Retake</button>
    </div>`;

  // store temporarily
  window._capturedImageData = imageData;
  window._capturedDataUrl = dataUrl;
}
async function submitCapture() {
  if (submitted || !window._capturedImageData || !gameData) return;
  const score = calculateColorScore(window._capturedImageData, gameData.current_color);
  // Save submission to Supabase
  await sb.from('submissions').upsert({
    player_id: playerId, game_code: gameCode,
    round: gameData.round, score: score, submitted_at: Date.now()
  }, { onConflict: 'player_id,game_code,round' });

  submitted = true;
  roundScore = score;
  photoPreviewUrl = window._capturedDataUrl;
  renderPlaying();
}

// ─── Game Actions ───
async function createGame() {
  const code = genCode();
  gameCode = code;
  role = 'admin';
  await sb.from('games').insert({ code, status:'lobby', round:0 });
  gameData = { code, status:'lobby', round:0 };
  players = [];
  subscribeToGame(code);
  showScreen('lobby');
  renderLobby();
}

async function joinGame() {
  const code = document.getElementById('joinCodeInput').value.toUpperCase().trim();
  const name = document.getElementById('playerNameInput').value.trim();
  if (!code || !name) return;

  const { data: game } = await sb.from('games').select('*').eq('code', code).single();
  if (!game) { alert('Game not found!'); return; }
  if (game.status !== 'lobby') { alert('Game already in progress!'); return; }

  // Check if already joined
  const { data: existing } = await sb.from('players').select('*').eq('id', playerId).eq('game_code', code).single();
  if (!existing) {
    const { data: allPlayers } = await sb.from('players').select('*').eq('game_code', code);
    if (allPlayers && allPlayers.length >= MAX_PLAYERS) { alert('Game is full!'); return; }
    await sb.from('players').insert({ id: playerId, game_code: code, name, score: 0 });
  }

  gameCode = code;
  role = 'player';
  gameData = game;
  await refreshPlayers();
  subscribeToGame(code);
  showScreen('lobby');
  renderLobby();
}

async function startRound() {
  if (role !== 'admin') return;
  const color = generateRandomColor();
  const newRound = (gameData?.round || 0) + 1;
  await sb.from('games').update({
    status: 'playing', round: newRound,
    current_color: color, round_started_at: Date.now(),
    round_results: null
  }).eq('code', gameCode);
  // Clear old submissions
  await sb.from('submissions').delete().eq('game_code', gameCode).eq('round', newRound);
  submitted = false; roundScore = null; photoPreviewUrl = null;
}

async function endRound() {
  if (role !== 'admin' || !gameData || gameData.status !== 'playing') return;
  // Fetch all submissions for this round
  const { data: subs } = await sb.from('submissions').select('*').eq('game_code', gameCode).eq('round', gameData.round);
  const results = {};
  for (const p of players) {
    const sub = (subs || []).find(s => s.player_id === p.id);
    const pts = sub ? sub.score : 0;
    results[p.id] = pts;
    // Update player score
    await sb.from('players').update({ score: p.score + pts }).eq('id', p.id).eq('game_code', gameCode);
  }
  await refreshPlayers();
  // Check for winner
  const winner = players.find(p => p.score >= WIN_SCORE);
  if (winner) {
    await sb.from('games').update({
      status: 'gameOver', round_results: results,
      winner: { id: winner.id, name: winner.name, score: winner.score }
    }).eq('code', gameCode);
  } else {
    await sb.from('games').update({ status: 'roundEnd', round_results: results }).eq('code', gameCode);
  }
}

async function playAgain() {
  if (role !== 'admin') return;
  // Reset all player scores
  for (const p of players) {
    await sb.from('players').update({ score: 0 }).eq('id', p.id).eq('game_code', gameCode);
  }
  await sb.from('games').update({
    status: 'lobby', round: 0, current_color: null,
    round_started_at: null, round_results: null, winner: null
  }).eq('code', gameCode);
  await refreshPlayers();
}

// ─── Helpers ───
function checkJoinBtn() {
  const code = document.getElementById('joinCodeInput').value.trim();
  const name = document.getElementById('playerNameInput').value.trim();
  document.getElementById('joinBtn').disabled = code.length < 5 || !name;
}

function esc(str) {
  const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
}
</script>
